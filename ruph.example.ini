; ruph configuration
; Copy to ruph.ini in docroot, cwd, ~/.ruph/, or /etc/ruph/
; Or specify with: ./ruph -c /path/to/ruph.ini
; CLI arguments override these values.

;; ── Global settings ──
[server]
; Default document root (can also be the first CLI argument)
;docroot = /var/www/html
; error, warn, info, debug, trace
log_level = info
; Enable logging to stdout/console (default: off)
;log_console = true
; Default access log for all domains without a specific access_log.
; Domains with trailhead_owner set skip file access logging.
;access_log = /var/log/ruph/default.log
; Comma-separated list of index files to try
index_files = _index.php
; Status page URL (disabled if absent)
;status_page = /status
; Full request logging to SQLite DB (disabled if absent)
; Logs every request with headers, timing, response info, etc.
; Post-processing columns (geo, ASN, bot detection) can be filled by external tools.
;log_full = /var/www/live/ruph_logs/requests.db

;; ── Trailhead remote log ingestion ──
;; Ships full request logs (NDJSON) directly to a Trailhead API endpoint.
;; Batches up to 400 events and flushes every 5 seconds.
;; Requires both api_url and api_key to enable.
;[trailhead]
;api_url = https://your-api-id.execute-api.region.amazonaws.com/v1
;api_key = your-api-key-here
;; Owner used for domains without a per-vhost trailhead_owner
;default_owner = myserver

;; ── HTTPS listener ──
[server.https]
bind = 0.0.0.0:443
tls = true

;; ── HTTP listener (optional) ──
;[server.http]
;bind = 0.0.0.0:80

;; ── PHP configuration (all listeners) ──
[php.*]
; Processor priority:
;   auto     - AST -> embedded -> cgi (default)
;   cgi      - external PHP binary first, then AST -> embedded
;   ast      - AST tree-sitter only
;   embedded - regex-based only
processor = auto
; Path to PHP binary (auto-detected if empty)
;binary = /usr/local/bin/php-cgi

;; ── SSL certificates ──
[ssl]
; Override SSL certificate directory (default: ~/.ruph/ssl)
;dir = /etc/ruph/ssl

;; ── Default docroot for all HTTP connections ──
;; Used with [server.http] — typically redirects to HTTPS.
;[http.*]
;docroot = /var/www/http_root

;; ── Default docroot for all HTTPS connections ──
;; Fallback when no per-domain section matches.
;[https.*]
;docroot = /var/www/html

;; ── Per-domain virtual hosts ──
;; Section name determines the match rule:
;;   [https.example.com]   — exact match (pattern has a dot)
;;   [https.www]           — prefix match: www.* (pattern has no dot)
;;   [https.a.com,https.b.com] — multiple domains, same settings
;;
;; Priority: exact match > longest prefix > [https.*] > [server] docroot

;[https.example.com]
;docroot = /var/www/example.com
;access_log = /var/log/ruph/example.com.log
;; Trailhead owner — when set, request data goes to Trailhead API instead of
;; the file access_log.  Error logs always go to file.
;trailhead_owner = examplecom

;[https.other.org]
;docroot = /var/www/other.org

; Prefix match: any host starting with "www" over HTTPS (www.*)
;[https.www]
;docroot = /var/www/http_root

; Multiple domains sharing the same docroot
;[https.alias1.com,https.alias2.com]
;docroot = /var/www/shared
