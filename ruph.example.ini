; ruph configuration
; Copy to ruph.ini in docroot, cwd, ~/.ruph/, or /etc/ruph/
; Or specify with: ./ruph -c /path/to/ruph.ini
; CLI arguments override these values.

[server]
; IP:port to bind to
bind = 0.0.0.0:8082
; error, warn, info, debug, trace
log_level = info
; Enable TLS (uses certs from ~/.ruph/ssl)
tls = false

[http]
; Document root directory (can also be the first CLI argument)
;docroot = /var/www/html

; Per-domain docroots — override the default docroot for specific virtual hosts.
; The key must be "docroot.<domain>" where <domain> matches the Host header
; (port is ignored, so "example.com" matches "example.com:443" too).
; Any number of domains can be listed.
;docroot.example.com = /var/www/example.com
;docroot.other.org   = /var/www/other.org

; Comma-separated list of index files to try
index_files = _index.php

[php]
; Processor priority:
;   auto     - AST -> embedded -> libphp (default)
;   libphp   - external PHP binary first, then AST -> embedded
;   ast      - AST tree-sitter only
;   embedded - regex-based only
processor = auto
; Path to PHP binary (auto-detected if empty)
;binary = /usr/local/bin/php

[ssl]
; Override SSL certificate directory (default: ~/.ruph/ssl)
;dir = /etc/ruph/ssl
